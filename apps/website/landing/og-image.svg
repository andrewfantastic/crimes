<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="crimes — a crime scene investigator for your codebase. Built for agents, readable by humans.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#161616"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <style>
      .brand    { font: 700 64px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; fill: #ffffff; letter-spacing: -0.01em; }
      .title    { font: 700 84px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; fill: #ffffff; letter-spacing: -0.02em; }
      .tag      { font: 500 40px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; fill: #a3a3a3; letter-spacing: 0; }
      .pill     { font: 600 24px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; fill: #ef4444; }
      .url      { font: 600 28px ui-monospace, "SF Mono", Menlo, monospace; fill: #a3a3a3; }
      .accent   { fill: #ef4444; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Brand mark + name -->
  <g transform="translate(80,90)">
    <g stroke="#ef4444" stroke-width="5" stroke-linecap="round" fill="none">
      <circle cx="30" cy="30" r="22"/>
      <line x1="30" y1="0"  x2="30" y2="14"/>
      <line x1="30" y1="46" x2="30" y2="60"/>
      <line x1="0"  y1="30" x2="14" y2="30"/>
      <line x1="46" y1="30" x2="60" y2="30"/>
    </g>
    <circle cx="30" cy="30" r="4" fill="#ef4444"/>
    <text x="80" y="48" class="brand">crimes</text>
  </g>

  <!-- Pill -->
  <g transform="translate(80,200)">
    <rect width="320" height="44" rx="22" fill="rgba(239,68,68,0.16)"/>
    <text x="22" y="30" class="pill">open source · MIT · local</text>
  </g>

  <!-- Title -->
  <text x="80" y="340" class="title">A crime scene investigator</text>
  <text x="80" y="430" class="title">for your codebase.</text>

  <!-- Tagline -->
  <text x="80" y="500" class="tag">Built for agents, readable by humans.</text>

  <!-- Bottom-row URL -->
  <line x1="80" y1="550" x2="1120" y2="550" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <text x="80" y="595" class="url">crimes.sh</text>
  <text x="1120" y="595" class="url" text-anchor="end">npx crimes scan .</text>
</svg>
