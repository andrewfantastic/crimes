name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: install · build · typecheck · test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in root package.json.

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Smoke test scan (human)
        run: node packages/cli/dist/index.js scan examples/messy-ts-app --no-color

      - name: Smoke test scan (json)
        run: |
          node packages/cli/dist/index.js scan examples/messy-ts-app --format json > /tmp/report.json
          node -e "const r=JSON.parse(require('fs').readFileSync('/tmp/report.json','utf8')); if(!r.schema_version||!Array.isArray(r.findings))process.exit(1); console.log('schema',r.schema_version,'findings',r.findings.length)"

      # The website pulls in Astro 6, which requires Node >=22.12. The
      # rest of the matrix (Node 20) still validates the published
      # crimes CLI against its engines.node ">=18" contract; only the
      # website step needs the newer toolchain.
      - name: Build website (landing + /docs Starlight site)
        if: matrix.node == '22'
        run: pnpm --filter @crimes/website build

      - name: Verify /docs/ tree contains every expected page
        if: matrix.node == '22'
        run: node apps/website/scripts/verify-build.mjs

  publish-smoke:
    name: publish smoke (pack + install + run)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in root package.json.

      - uses: actions/setup-node@v4
        with:
          # Hold to one Node version — this job validates the *published*
          # artifact, not Node compatibility (that's `build`'s matrix).
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Publish smoke (build, pack, install tarball, run)
        run: pnpm run smoke
