name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: install · build · typecheck · test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Smoke test scan (human)
        run: node packages/cli/dist/index.js scan examples/messy-ts-app --no-color

      - name: Smoke test scan (json)
        run: |
          node packages/cli/dist/index.js scan examples/messy-ts-app --format json > /tmp/report.json
          node -e "const r=JSON.parse(require('fs').readFileSync('/tmp/report.json','utf8')); if(!r.schema_version||!Array.isArray(r.findings))process.exit(1); console.log('schema',r.schema_version,'findings',r.findings.length)"
